<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trapping Rain Water Visualizer</title> 
    <style>
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: #141414; color: #fff; display: flex; height: 100vh; overflow: hidden; }
        .pane { flex: 1; padding: 20px; display: flex; flex-direction: column; }
        .left-pane { border-right: 2px solid #333; align-items: center; position: relative; } /* Added position relative */
        .right-pane { background: #0f0f0f; font-family: monospace; font-size: 18px; padding: 40px; overflow-y: auto; }
        
        .controls { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; justify-content: center; align-items: center; }
        input { background: #222; border: 1px solid #444; color: #fff; padding: 10px; font-size: 16px; border-radius: 4px; width: 300px; text-align: center; }
        button { background: #3498db; border: none; color: white; padding: 10px 20px; font-size: 16px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #2980b9; }
        button.reset { background: #e74c3c; }
        button.reset:hover { background: #c0392b; }

        .stats { display: flex; gap: 40px; margin-bottom: 40px; font-size: 20px; font-weight: bold; }
        .stat-water { color: #3498db; font-size: 24px; }
        .stat-l { color: #e74c3c; }
        .stat-r { color: #9b59b6; }
        
        /* FIX: Added Back Link Style */
        .back-link { position: absolute; top: 10px; left: 10px; color: #bdc3c7; text-decoration: none; font-size: 14px; padding: 5px 10px; background: rgba(255,255,255,0.05); border-radius: 4px; }
        .back-link:hover { color: #fff; background: rgba(255,255,255,0.1); }

        .viz-container { position: relative; height: 400px; display: flex; align-items: flex-end; gap: 2px; border-bottom: 4px solid #2c3e50; padding: 0 10px; }
        /* FIX: Made columns thinner (width: 25px, was 40px) */
        .column { position: relative; width: 25px; display: flex; flex-direction: column; justify-content: flex-end; }
        .water { background: #3498db; opacity: 0.8; width: 100%; transition: height 0.3s ease; }
        .terrain { background: #ecf0f1; width: 100%; border-radius: 2px 2px 0 0; }
        .label { position: absolute; bottom: -20px; width: 100%; text-align: center; color: #bdc3c7; font-size: 12px; }
        
        /* FIX: Pointer logic updated for thinner layout and prevented text overlap */
        .pointer { position: absolute; bottom: -70px; min-width: 60px; text-align: center; font-weight: bold; transition: left 0.3s ease; transform: translateX(-50%); white-space: nowrap; font-size: 16px;}
        .pointer span { font-size: 10px; } /* Thinner index text */
        .pointer-l { color: #e74c3c; }
        .pointer-r { color: #9b59b6; }

        .code-line { padding: 4px 8px; border-radius: 4px; transition: background 0.2s; white-space: pre; }
        .active-line { background: #2c3e50; color: #61dafb; }
    </style>
</head>
<body>

    <div class="pane left-pane">
        <a href="index.html" class="back-link">← Hub</a>
        <h2>Trapping Rain Water</h2>
        
        <div class="controls">
            <input type="text" id="arrInput" value="0, 1, 0, 2, 1, 0, 1, 3, 2, 1, 2, 1">
            <button onclick="init()">Generate</button>
            <button onclick="nextStep()" id="nextBtn">Next Step</button>
            <button class="reset" onclick="init()">Reset</button>
        </div>

        <div class="stats">
            <div class="stat-l">maxL: <span id="lMax">0</span></div>
            <div class="stat-water">res: <span id="totWater">0</span></div>
            <div class="stat-r">maxR: <span id="rMax">0</span></div>
        </div>

        <div class="viz-container" id="viz">
            <div class="pointer pointer-l" id="ptrL">l<br><span id="idxL">idx = 0</span></div>
            <div class="pointer pointer-r" id="ptrR">r<br><span id="idxR">idx = 0</span></div>
        </div>
    </div>

    <div class="pane right-pane" id="codeBox"></div>

    <script>
        const codeLines = [
            "l, r = 0, len(height) - 1",
            "maxL = height[l]",
            "maxR = height[r]",
            "res = 0",
            "",
            "while l < r:",
            "    if maxL < maxR:",
            "        l += 1",
            "        maxL = max(maxL, height[l])",
            "        res += maxL - height[l]",
            "    else:",
            "        r -= 1",
            "        maxR = max(maxR, height[r])",
            "        res += maxR - height[r]",
            "",
            "return res"
        ];

        let heights = [], l = 0, r = 0, maxL = 0, maxR = 0, res = 0;
        let stepGenerator = null;
        // FIX: Thinner UNIT
        const UNIT = 40; 
        // FIX: Consistent width tracking (COL_WIDTH + GAP)
        const COL_TRACK = 27; 
        // FIX: LEFT PADDING 
        const PAD = 10; 

        function renderCode() {
            const box = document.getElementById('codeBox');
            box.innerHTML = codeLines.map((line, idx) => `<div class="code-line" id="line-${idx}">${line}</div>`).join('');
        }

        function highlightLine(lineNum) {
            document.querySelectorAll('.code-line').forEach(el => el.classList.remove('active-line'));
            if (lineNum !== null && document.getElementById(`line-${lineNum}`)) {
                document.getElementById(`line-${lineNum}`).classList.add('active-line');
            }
        }

        function updateUI() {
            document.getElementById('lMax').innerText = maxL;
            document.getElementById('rMax').innerText = maxR;
            document.getElementById('totWater').innerText = res;
            document.getElementById('idxL').innerText = `idx = ${l}`;
            document.getElementById('idxR').innerText = `idx = ${r}`;

            // FIX: Positioning logic updated for thinner columns and thinner gap
            const leftPos = PAD + (l * COL_TRACK) + 12; // (25 col width / 2)
            const rightPos = PAD + (r * COL_TRACK) + 12;

            document.getElementById('ptrL').style.left = `${leftPos}px`;
            document.getElementById('ptrR').style.left = `${rightPos}px`;
        }

        function fillWater(index, amount) {
            const waterEl = document.getElementById(`water-${index}`);
            if (waterEl) waterEl.style.height = `${amount * UNIT}px`;
        }

        function init() {
            const input = document.getElementById('arrInput').value;
            heights = input.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
            
            if (heights.length === 0) return;

            const viz = document.getElementById('viz');
            viz.querySelectorAll('.column').forEach(e => e.remove());

            heights.forEach((h, idx) => {
                const col = document.createElement('div');
                col.className = 'column';
                col.innerHTML = `
                    <div class="water" id="water-${idx}" style="height: 0px;"></div>
                    <div class="terrain" style="height: ${h * UNIT}px;"></div>
                    <div class="label">${h}</div>
                `;
                // FIX: Ensure ptrL exists before inserting
                const ptrL = document.getElementById('ptrL');
                if (ptrL) viz.insertBefore(col, ptrL);
                else viz.appendChild(col); // Fallback
            });

            l = 0; 
            r = heights.length - 1;
            maxL = heights[l];
            maxR = heights[r];
            res = 0;

            document.getElementById('nextBtn').disabled = false;
            renderCode();
            highlightLine(0);
            updateUI();
            stepGenerator = runAlgorithm();
        }

        function* runAlgorithm() {
            highlightLine(1); yield; 
            highlightLine(2); yield; 
            highlightLine(3); yield; 

            while (l < r) {
                highlightLine(5); yield; 
                highlightLine(6); yield; 

                if (maxL < maxR) {
                    l++;
                    highlightLine(7); updateUI(); yield; 
                    
                    maxL = Math.max(maxL, heights[l]);
                    highlightLine(8); updateUI(); yield; 
                    
                    const trapped = Math.max(0, maxL - heights[l]);
                    res += trapped;
                    highlightLine(9); updateUI(); fillWater(l, trapped); yield; 
                } else {
                    highlightLine(10); yield; 
                    r--;
                    highlightLine(11); updateUI(); yield; 
                    
                    maxR = Math.max(maxR, heights[r]);
                    highlightLine(12); updateUI(); yield; 
                    
                    const trapped = Math.max(0, maxR - heights[r]);
                    res += trapped;
                    highlightLine(13); updateUI(); fillWater(r, trapped); yield; 
                }
            }
            highlightLine(15); 
            document.getElementById('nextBtn').disabled = true;
        }

        function nextStep() {
            if (stepGenerator) stepGenerator.next();
        }

        init();
    </script>
</body>
</html>
